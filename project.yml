name: YTBookmark

options:
  bundleIdPrefix: com.myapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

targets:

  YTBookmark:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.myapp.ytbookmark
    sources:
      - path: YTBookmark
    configFiles:
      Debug: YTBookmark/App/Config.xcconfig
      Release: YTBookmark/App/Config.xcconfig
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: YTBookmark/Info.plist
    info:
      path: YTBookmark/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        LSApplicationQueriesSchemes:
          - vnd.youtube
        CFBundleURLTypes:
          - CFBundleURLName: com.myapp.ytbookmark
            CFBundleURLSchemes:
              - ytbookmark
        YouTubeAPIKey: "$(YOUTUBE_API_KEY)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: YTBookmark/YTBookmark.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.myapp.ytbookmark
    dependencies:
      - target: ShareExtension
        embed: true
      - target: BookmarkWidget
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.myapp.ytbookmark.share
    sources:
      - path: ShareExtension
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: ShareExtension/Info.plist
    info:
      path: ShareExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.myapp.ytbookmark

  BookmarkWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.myapp.ytbookmark.widget
    sources:
      - path: BookmarkWidget
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: BookmarkWidget/Info.plist
    info:
      path: BookmarkWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: BookmarkWidget/BookmarkWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.myapp.ytbookmark

  YTBookmarkTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.myapp.ytbookmarkTests
    sources:
      - path: YTBookmarkTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: YTBookmark
